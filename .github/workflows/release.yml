name: Upload .NET package

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Resolve version from tag
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?)$ ]]; then
            echo "Git tag must be formatted 'v#.#.#' or 'v#.#.#-rc#' (got '$TAG')" >&2
            exit 1
          fi
          version="${BASH_REMATCH[1]}"
          echo "version=$version" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Build and pack
        shell: bash
        run: |
          set -euo pipefail
          dotnet pack --configuration Release -p:Version="$version" src/Transit
          ls src/Transit/bin/Release/

      - name: Push package to GitHub Packages
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push src/Transit/bin/Release/*.nupkg \
            --skip-duplicate \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source https://nuget.pkg.github.com/xledger
