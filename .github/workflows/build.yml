name: Build .NET assemblies and test

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - '!src/Transit.Benchmarks/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**'
      - '!src/Transit.Benchmarks/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-dotnet@v5.4.0
      with:
        dotnet-version: '10.0.x'
    - run: dotnet restore src/Transit.Tests/Transit.Tests.csproj
    - run: dotnet build src/Transit.Tests/Transit.Tests.csproj --no-restore
    - run: dotnet test src/Transit.Tests/Transit.Tests.csproj --no-build --verbosity normal